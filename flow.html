<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#060D0A">
<title>GEO Setup Flow — Škoda X</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body { background: #060D0A; overflow-x: hidden; -webkit-font-smoothing: antialiased; font-family: 'Outfit', sans-serif; color: #E8F5EE; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #14352A; border-radius: 4px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes flowFadeIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
  @keyframes glowPulse { 0%,100% { filter: drop-shadow(0 0 6px #78FAAE44); } 50% { filter: drop-shadow(0 0 18px #78FAAE88); } }
  @keyframes tooltipIn { from { opacity: 0; transform: translateX(-50%) translateY(6px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes tooltipInUp { from { opacity: 0; transform: translateX(-50%) translateY(-6px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const T = {
  emerald: "#0E3A2F", electric: "#78FAAE", emeraldLight: "#14493B",
  bg: "#060D0A", cardBg: "#0B1E17", cardBorder: "#14352A",
  muted: "#4A7A6A", text: "#E8F5EE", textDim: "#9EC5B3",
  amber: "#F5C842", red: "#E85454", cyan: "#5AD4C4",
};

const STEPS = [
  { id: "brand", num: 1, title: "Brand Identity", desc: "Define your brand for AI monitoring" },
  { id: "competitors", num: 2, title: "Competitors", desc: "Brand & model competitors by powertrain" },
  { id: "platforms", num: 3, title: "AI Platforms", desc: "Which AI engines to monitor" },
  { id: "personas", num: 4, title: "Personas", desc: "Who is asking AI about you?" },
  { id: "queries", num: 5, title: "Query Categories", desc: "What questions to test per powertrain" },
  { id: "markets", num: 6, title: "Markets & Languages", desc: "EU and non-EU target regions" },
  { id: "models", num: 7, title: "Product / Model Mode", desc: "Track Skoda models by powertrain" },
  { id: "scoring", num: 8, title: "Scoring & KPIs", desc: "What success looks like" },
  { id: "schedule", num: 9, title: "Update Schedule", desc: "Monitoring frequency" },
  { id: "display", num: 10, title: "Display & Output", desc: "How to view results" },
  { id: "launch", num: 11, title: "Review & Launch", desc: "Final check and go live" },
];

const STEP_TOOLTIPS = {
  brand: ["Brand name, website & keywords", "Target audience & vertical"],
  competitors: ["ICE / Hybrid / BEV brand rivals", "Model-level competitor mapping"],
  platforms: ["ChatGPT, Claude, Gemini, Perplexity", "API budget & cost estimation"],
  personas: ["User profiles asking AI about you", "Demographics & purchase intent"],
  queries: ["19 categories per powertrain", "Custom query templates"],
  markets: ["EU + non-EU country selection", "Language localization"],
  models: ["Škoda lineup by powertrain", "ICE, Hybrid & BEV models"],
  scoring: ["Visibility, sentiment & content KPIs", "Citation & query tracking"],
  schedule: ["Hourly / daily / weekly updates", "Rate limiting & burst mode"],
  display: ["TV, panel & mobile layouts", "Exports, alerts & reports"],
  launch: ["Full config summary & dry-run", "Cost breakdown & activation"],
};

function App() {
  const [started, setStarted] = useState(false);
  const [visibleCount, setVisibleCount] = useState(0);
  const [hovered, setHovered] = useState(null);
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  const sepIndex = 7;
  const topSteps = STEPS.slice(0, sepIndex);
  const botSteps = STEPS.slice(sepIndex);

  useEffect(() => {
    if (!started) return;
    if (visibleCount >= STEPS.length) return;
    const t = setTimeout(() => setVisibleCount(v => v + 1), 200);
    return () => clearTimeout(t);
  }, [started, visibleCount]);

  const gap = 14;
  const isBottom = (i) => i >= sepIndex;

  function FlowBox({ s, i, visible, color }) {
    const isHov = hovered === i;
    const showBelow = isBottom(i);
    return React.createElement("div", {
      key: s.id,
      onClick: () => visible && (window.location.href = `setup.html`),
      onMouseEnter: () => visible && setHovered(i),
      onMouseLeave: () => setHovered(null),
      style: {
        flex: 1, minHeight: 0, borderRadius: 16, cursor: visible ? "pointer" : "default",
        border: `1.5px solid ${isHov ? color : color + "33"}`,
        background: isHov ? `linear-gradient(160deg, ${T.emeraldLight}, ${color}12)` : `${T.cardBg}ee`,
        padding: "24px 22px 20px",
        display: "flex", flexDirection: "column", justifyContent: "space-between",
        opacity: visible ? 1 : 0,
        transform: visible ? "translateY(0) scale(1)" : "translateY(30px) scale(0.9)",
        transition: "all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)",
        boxShadow: isHov ? `0 4px 40px ${color}25, 0 0 60px ${color}10` : `0 2px 12px rgba(0,0,0,0.2)`,
        position: "relative", overflow: isHov ? "visible" : "hidden",
      },
    },
      // Large watermark number
      React.createElement("div", { style: {
        position: "absolute", top: -8, right: 6,
        fontSize: 72, fontWeight: 900, fontFamily: "'JetBrains Mono', monospace",
        color: `${color}08`, lineHeight: 1, pointerEvents: "none",
      }}, s.num),
      // Content
      React.createElement("div", null,
        React.createElement("div", { style: {
          fontSize: 11, fontWeight: 700, color: isHov ? color : `${color}99`,
          fontFamily: "'JetBrains Mono', monospace", letterSpacing: 2, marginBottom: 10,
          transition: "color 0.2s ease",
        }}, `STEP ${s.num}`),
        React.createElement("div", { style: {
          fontSize: 18, fontWeight: 800, color: isHov ? T.text : `${T.text}cc`,
          fontFamily: "'Outfit', sans-serif", lineHeight: 1.25,
          transition: "color 0.2s ease",
        }}, s.title),
      ),
      React.createElement("div", { style: {
        fontSize: 12, color: `${T.muted}cc`, marginTop: 12, lineHeight: 1.45,
        fontFamily: "'JetBrains Mono', monospace",
      }}, s.desc),
      // Bottom accent
      React.createElement("div", { style: {
        position: "absolute", bottom: 0, left: 0, right: 0, height: 3,
        background: isHov ? `linear-gradient(90deg, ${color}, ${color}44)` : `${color}18`,
        transition: "background 0.25s ease",
      }}),
      // Tooltip popup — above for top row, below for bottom row
      isHov && !isMobile && STEP_TOOLTIPS[s.id] && React.createElement("div", {
        style: Object.assign({
          position: "absolute", left: "50%",
          minWidth: 280, maxWidth: 340, padding: "18px 22px",
          borderRadius: 14,
          background: `linear-gradient(165deg, ${T.emeraldLight}, ${T.bg}f8)`,
          border: `1px solid ${color}44`,
          boxShadow: `0 12px 48px rgba(0,0,0,0.5), 0 0 24px ${color}15`,
          zIndex: 100, pointerEvents: "none",
        }, showBelow ? {
          top: "calc(100% + 14px)", transform: "translateX(-50%)",
          animation: "tooltipIn 0.2s ease-out",
        } : {
          bottom: "calc(100% + 14px)", transform: "translateX(-50%)",
          animation: "tooltipInUp 0.2s ease-out",
        }),
      },
        // Arrow — points up for below-tooltip, points down for above-tooltip
        React.createElement("div", { style: showBelow ? {
          position: "absolute", top: -6, left: "50%", transform: "translateX(-50%) rotate(45deg)",
          width: 12, height: 12,
          background: T.emeraldLight, borderLeft: `1px solid ${color}44`, borderTop: `1px solid ${color}44`,
        } : {
          position: "absolute", bottom: -6, left: "50%", transform: "translateX(-50%) rotate(45deg)",
          width: 12, height: 12,
          background: T.bg, borderRight: `1px solid ${color}44`, borderBottom: `1px solid ${color}44`,
        }}),
        // Tooltip title
        React.createElement("div", { style: {
          fontSize: 13, fontWeight: 800, color, letterSpacing: 2,
          fontFamily: "'JetBrains Mono', monospace", textTransform: "uppercase",
          marginBottom: 12, paddingBottom: 10,
          borderBottom: `1px solid ${color}22`,
        }}, `Step ${s.num} — ${s.title}`),
        // Tooltip items
        STEP_TOOLTIPS[s.id].map((tip, ti) =>
          React.createElement("div", { key: ti, style: {
            display: "flex", alignItems: "flex-start", gap: 10,
            fontSize: 15, color: `${T.text}dd`, lineHeight: 1.5,
            fontFamily: "'Outfit', sans-serif",
            marginBottom: ti < STEP_TOOLTIPS[s.id].length - 1 ? 8 : 0,
          }},
            React.createElement("span", { style: { color, fontSize: 9, marginTop: 6, flexShrink: 0 } }, "\u25cf"),
            tip,
          )
        ),
      ),
    );
  }

  return React.createElement("div", {
    style: {
      position: "fixed", inset: 0,
      background: `radial-gradient(ellipse at 50% 25%, ${T.emerald}55, ${T.bg} 70%)`,
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: isMobile ? "flex-start" : "center",
      overflowY: "auto", overflowX: "hidden",
      paddingTop: isMobile ? 80 : 0, paddingBottom: isMobile ? 40 : 0,
    },
  },
    // Grid bg
    React.createElement("div", { style: {
      position: "absolute", inset: 0, opacity: 0.02, pointerEvents: "none",
      backgroundImage: `linear-gradient(${T.electric} 1px, transparent 1px), linear-gradient(90deg, ${T.electric} 1px, transparent 1px)`,
      backgroundSize: "80px 80px",
    }}),

    // Header
    React.createElement("div", { style: { position: "fixed", top: 0, left: 0, right: 0, zIndex: 50, display: "flex", flexDirection: "column", alignItems: "center", padding: "22px 0 14px", background: `linear-gradient(180deg, ${T.bg}, ${T.bg}dd 80%, transparent)` } },
      React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 20 } },
        React.createElement("div", { style: { width: 50, height: 1, background: `linear-gradient(90deg, transparent, ${T.electric}55)` } }),
        React.createElement("div", { style: { fontSize: 15, fontWeight: 800, color: T.electric, letterSpacing: 5, fontFamily: "'JetBrains Mono', monospace", textTransform: "uppercase" } }, "GEO Setup Flow"),
        React.createElement("div", { style: { width: 50, height: 1, background: `linear-gradient(90deg, ${T.electric}55, transparent)` } }),
      ),
      React.createElement("div", { style: { fontSize: 12, fontWeight: 700, color: `${T.muted}aa`, letterSpacing: 3, fontFamily: "'Outfit', sans-serif", textTransform: "uppercase", marginTop: 4 } }, "\u0160koda X"),
    ),

    // Nav links — top right
    React.createElement("div", { style: { position: "fixed", top: 20, right: 24, zIndex: 60, display: "flex", gap: 10 } },
      React.createElement("a", {
        href: "setup.html",
        style: {
          padding: "8px 16px", borderRadius: 8, textDecoration: "none",
          background: `${T.cardBg}aa`, border: `1px solid ${T.cardBorder}`,
          color: T.electric, fontSize: 12, fontWeight: 700,
          fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1,
          transition: "all 0.2s ease",
        },
      }, "\u2699 Setup"),
      React.createElement("a", {
        href: "dashboard.html",
        style: {
          padding: "8px 16px", borderRadius: 8, textDecoration: "none",
          background: `${T.cardBg}aa`, border: `1px solid ${T.cardBorder}`,
          color: T.muted, fontSize: 12, fontWeight: 700,
          fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1,
          transition: "all 0.2s ease",
        },
      }, "\u25c0 Dashboard"),
    ),

    // START button
    !started && React.createElement("button", {
      onClick: () => { setStarted(true); setVisibleCount(1); },
      style: {
        padding: "24px 64px", borderRadius: 16, cursor: "pointer", border: "none",
        background: `linear-gradient(135deg, ${T.electric}, ${T.cyan})`,
        color: T.emerald, fontSize: 20, fontWeight: 800, letterSpacing: 4, textTransform: "uppercase",
        fontFamily: "'JetBrains Mono', monospace",
        boxShadow: `0 0 80px ${T.electric}30, 0 0 160px ${T.electric}10`,
        animation: "glowPulse 2s ease-in-out infinite",
      },
    }, "\u25b6  START SETUP"),

    // Flow boxes
    started && React.createElement("div", { style: {
      display: "flex", flexDirection: "column", alignItems: "stretch",
      width: isMobile ? "calc(100vw - 32px)" : "calc(100vw - 80px)", maxWidth: 1600, gap: isMobile ? 12 : 20,
      padding: isMobile ? "0 4px" : "0 8px",
    }},

      // Row 1 label
      React.createElement("div", { style: {
        fontSize: isMobile ? 10 : 12, fontWeight: 700, color: `${T.electric}66`, letterSpacing: 4,
        fontFamily: "'JetBrains Mono', monospace", textTransform: "uppercase",
        textAlign: "center",
        opacity: visibleCount > 0 ? 1 : 0, transition: "opacity 0.4s ease",
      }}, "Configuration"),

      // Row 1
      React.createElement("div", { style: { display: "flex", flexDirection: isMobile ? "column" : "row", gap, alignItems: "stretch" } },
        topSteps.map((s, i) => FlowBox({ s, i, visible: i < visibleCount, color: T.electric })),
      ),

      // Separator
      visibleCount > sepIndex && React.createElement("div", { style: {
        height: 1, margin: "4px 0",
        background: `linear-gradient(90deg, transparent 5%, ${T.cardBorder} 30%, ${T.cardBorder} 70%, transparent 95%)`,
        animation: "fadeIn 0.4s ease-out",
      }}),

      // Row 2 label
      visibleCount > sepIndex && React.createElement("div", { style: {
        fontSize: isMobile ? 10 : 12, fontWeight: 700, color: `${T.amber}66`, letterSpacing: 4,
        fontFamily: "'JetBrains Mono', monospace", textTransform: "uppercase",
        textAlign: "center", animation: "fadeIn 0.4s ease-out",
      }}, "Scoring, Output & Launch"),

      // Row 2
      visibleCount > sepIndex && React.createElement("div", { style: isMobile ? {
        display: "flex", flexDirection: "column", gap,
      } : {
        display: "grid",
        gridTemplateColumns: "repeat(7, 1fr)",
        gap,
      }},
        botSteps.map((s, bi) => {
          const i = bi + sepIndex;
          return isMobile
            ? FlowBox({ s, i, visible: i < visibleCount, color: T.amber })
            : React.createElement("div", {
                key: s.id,
                style: { gridColumn: `${bi * 2 + 1} / span ${bi < 3 ? 2 : 1}` },
              }, FlowBox({ s, i, visible: i < visibleCount, color: T.amber }));
        }),
      ),
    ),

    // Legend
    started && visibleCount >= STEPS.length && React.createElement("div", { style: {
      marginTop: 28, display: "flex", alignItems: "center", gap: 28, flexWrap: "wrap", justifyContent: "center",
      animation: "fadeIn 0.5s ease-out", padding: "0 20px",
    }},
      React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
        React.createElement("div", { style: { width: 10, height: 10, borderRadius: 5, background: T.electric } }),
        React.createElement("span", { style: { fontSize: 12, color: T.muted, fontFamily: "'JetBrains Mono', monospace" } }, "Configuration"),
      ),
      React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
        React.createElement("div", { style: { width: 10, height: 10, borderRadius: 5, background: T.amber } }),
        React.createElement("span", { style: { fontSize: 12, color: T.muted, fontFamily: "'JetBrains Mono', monospace" } }, "Scoring & Output"),
      ),
      React.createElement("span", { style: { fontSize: 12, color: `${T.muted}88`, fontFamily: "'JetBrains Mono', monospace" } }, "\u00b7  Click any step to open Setup"),
    ),
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
