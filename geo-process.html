<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#060D0A">
<title>GEO Process — Škoda X</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body { background: #060D0A; overflow-x: hidden; -webkit-font-smoothing: antialiased; font-family: 'Outfit', sans-serif; color: #E8F5EE; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #14352A; border-radius: 4px; }
  @keyframes stairAppear {
    from { opacity: 0; transform: translateY(40px) scale(0.92); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes glowPulse { 0%,100% { box-shadow: 0 0 20px #78FAAE10; } 50% { box-shadow: 0 0 50px #78FAAE20; } }
  @keyframes particleUp {
    0% { opacity: 0; transform: translateY(0) scale(0); }
    20% { opacity: 1; transform: translateY(-8px) scale(1); }
    100% { opacity: 0; transform: translateY(-50px) scale(0.3); }
  }
  @keyframes arrowBounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const T = {
  emerald: "#0E3A2F", electric: "#78FAAE", emeraldLight: "#14493B",
  bg: "#060D0A", cardBg: "#0B1E17", cardBorder: "#14352A",
  muted: "#4A7A6A", text: "#E8F5EE", textDim: "#9EC5B3",
  amber: "#F5C842", red: "#E85454", cyan: "#5AD4C4",
  purple: "#B4A0FF", blue: "#5AA8D4",
};

const STAIRS = [
  {
    num: "01",
    title: "GEO Analytics",
    desc: "Monitoring & data collection from AI platforms",
    color: T.electric,
    details: "Systematic querying of ChatGPT, Claude, Gemini & Perplexity. Brand mention detection, position tracking, competitor analysis across all AI engines.",
  },
  {
    num: "02",
    title: "Executive Summary + Overview",
    desc: "High-level visibility scorecard",
    color: T.cyan,
    details: "Consolidated KPI dashboard with visibility score, sentiment trends, competitive positioning and key findings for leadership review.",
  },
  {
    num: "03",
    title: "Insights & Recommendations",
    desc: "Data-driven optimization strategy",
    color: T.blue,
    details: "Actionable recommendations based on gap analysis. Priority list of content improvements, keyword opportunities and competitive threats.",
  },
  {
    num: "04",
    title: "Content Sources",
    subtitle: "Website Metadata \u00b7 Website Content \u00b7 Media Content \u00b7 Blogs Content",
    desc: "Owned content optimization",
    color: T.purple,
    details: "Optimize website metadata, page content, media assets and blog articles for AI discoverability. Schema.org markup, structured data, factual accuracy.",
    channels: ["Website Metadata", "Website Content", "Media Content", "Blogs Content"],
  },
  {
    num: "05",
    title: "External Channels",
    subtitle: "Facebook \u00b7 YouTube \u00b7 Wikipedia \u00b7 Reddit",
    desc: "Third-party presence & citations",
    color: T.amber,
    details: "Strengthen brand presence on platforms that AI engines use as training data and citation sources. Ensure consistent, accurate brand information.",
    channels: ["Facebook", "YouTube", "Wikipedia", "Reddit"],
  },
  {
    num: "06",
    title: "Content Creation",
    desc: "Produce optimized content",
    color: T.electric,
    details: "Create new content specifically designed for AI visibility \u2014 authoritative articles, FAQ pages, structured comparisons, expert guides.",
  },
  {
    num: "07",
    title: "Implementation",
    desc: "Deploy & measure impact",
    color: T.cyan,
    details: "Publish optimized content, update metadata, deploy changes across all channels. Monitor AI response changes and measure visibility improvement.",
  },
];

function App() {
  const [visibleSteps, setVisibleSteps] = useState(0);
  const [activeStep, setActiveStep] = useState(null);
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
  const [started, setStarted] = useState(false);

  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  useEffect(() => {
    if (!started) return;
    if (visibleSteps >= STAIRS.length) return;
    const t = setTimeout(() => setVisibleSteps(v => v + 1), 400);
    return () => clearTimeout(t);
  }, [started, visibleSteps]);

  // Auto-start after mount
  useEffect(() => {
    const t = setTimeout(() => setStarted(true), 600);
    return () => clearTimeout(t);
  }, []);

  const stairW = isMobile ? 240 : 280;
  const stairH = isMobile ? 100 : 110;
  const gapX = isMobile ? 8 : 12;
  const gapY = isMobile ? 8 : 12;
  const stepX = stairW + gapX;
  const stepY = stairH + gapY;

  const totalW = stairW + stepX * (STAIRS.length - 1) + 40;
  const totalH = stairH + stepY * (STAIRS.length - 1) + 60;

  return React.createElement("div", { style: { minHeight: "100vh", background: T.bg, display: "flex", flexDirection: "column" } },

    // Grid bg
    React.createElement("div", { style: {
      position: "fixed", inset: 0, opacity: 0.015, pointerEvents: "none",
      backgroundImage: `linear-gradient(${T.electric} 1px, transparent 1px), linear-gradient(90deg, ${T.electric} 1px, transparent 1px)`,
      backgroundSize: "60px 60px",
    }}),

    // Header
    React.createElement("header", { style: {
      padding: isMobile ? "16px 16px" : "20px 40px",
      display: "flex", justifyContent: "space-between", alignItems: "center",
      borderBottom: `1px solid ${T.cardBorder}`,
      background: `${T.bg}ee`, backdropFilter: "blur(12px)",
      position: "sticky", top: 0, zIndex: 50, flexWrap: "wrap", gap: 12,
    }},
      React.createElement("div", null,
        React.createElement("div", { style: { fontSize: 12, fontWeight: 700, color: `${T.muted}aa`, letterSpacing: 3, fontFamily: "'Outfit', sans-serif", textTransform: "uppercase" } }, "\u0160koda X"),
        React.createElement("div", { style: { fontSize: isMobile ? 16 : 22, fontWeight: 900, color: T.electric, letterSpacing: 3, fontFamily: "'JetBrains Mono', monospace" } }, "GEO PROCESS"),
      ),
      React.createElement("div", { style: { display: "flex", gap: 8, flexWrap: "wrap" } },
        React.createElement("a", { href: "flow.html", style: { padding: "7px 14px", borderRadius: 8, textDecoration: "none", background: `${T.cardBg}aa`, border: `1px solid ${T.cardBorder}`, color: T.electric, fontSize: 11, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace" } }, "\u25c9 Flow"),
        React.createElement("a", { href: "setup.html", style: { padding: "7px 14px", borderRadius: 8, textDecoration: "none", background: `${T.cardBg}aa`, border: `1px solid ${T.cardBorder}`, color: T.electric, fontSize: 11, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace" } }, "\u2699 Setup"),
        React.createElement("a", { href: "index.html", style: { padding: "7px 14px", borderRadius: 8, textDecoration: "none", background: `${T.cardBg}aa`, border: `1px solid ${T.cardBorder}`, color: T.muted, fontSize: 11, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace" } }, "\u25c0 Dashboard"),
      ),
    ),

    // Main — staircase area
    React.createElement("div", { style: {
      flex: 1, display: "flex", alignItems: "center", justifyContent: "center",
      padding: isMobile ? "20px 8px" : "40px 20px",
      overflow: "auto",
    }},
      React.createElement("div", { style: {
        position: "relative",
        width: totalW,
        height: totalH,
        minWidth: totalW,
        minHeight: totalH,
      }},

        // Stairs — bottom-left to top-right
        STAIRS.map((stair, i) => {
          const idx = i;
          const fromBottom = i;
          const x = stepX * i;
          const y = totalH - stairH - stepY * i;
          const show = idx < visibleSteps;
          const active = activeStep === i;

          return React.createElement("div", {
            key: i,
            onClick: () => setActiveStep(active ? null : i),
            style: {
              position: "absolute",
              left: x,
              top: y,
              width: stairW,
              height: stairH,
              opacity: show ? 1 : 0,
              transform: show ? "translateY(0) scale(1)" : "translateY(40px) scale(0.92)",
              transition: "opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)",
              cursor: "pointer",
              zIndex: STAIRS.length - i,
            },
          },

            // Stair block — the "step" shape
            React.createElement("div", { style: {
              width: "100%", height: "100%", borderRadius: 14,
              background: active
                ? `linear-gradient(135deg, ${stair.color}18, ${T.emeraldLight})`
                : `linear-gradient(160deg, ${T.cardBg}, ${T.cardBg}dd)`,
              border: `1.5px solid ${active ? stair.color + "66" : stair.color + "25"}`,
              padding: isMobile ? "14px 16px" : "18px 22px",
              display: "flex", flexDirection: "column", justifyContent: "center",
              position: "relative", overflow: "hidden",
              transition: "all 0.3s ease",
              boxShadow: active
                ? `0 8px 40px ${stair.color}20, 0 0 60px ${stair.color}08`
                : `0 4px 20px rgba(0,0,0,0.3)`,
              animation: active ? "glowPulse 2.5s ease-in-out infinite" : "none",
            }},

              // Watermark number
              React.createElement("div", { style: {
                position: "absolute", top: -4, right: 10,
                fontSize: isMobile ? 60 : 72, fontWeight: 900,
                fontFamily: "'JetBrains Mono', monospace",
                color: `${stair.color}06`, lineHeight: 1, pointerEvents: "none",
              }}, stair.num),

              // Step label
              React.createElement("div", { style: {
                fontSize: 10, fontWeight: 700, color: active ? stair.color : `${stair.color}88`,
                fontFamily: "'JetBrains Mono', monospace", letterSpacing: 2,
                marginBottom: 6, transition: "color 0.3s ease", textTransform: "uppercase",
              }}, `Step ${stair.num}`),

              // Title
              React.createElement("div", { style: {
                fontSize: isMobile ? 16 : 19, fontWeight: 800, color: active ? T.text : `${T.text}cc`,
                fontFamily: "'Outfit', sans-serif", lineHeight: 1.25,
                transition: "color 0.3s ease",
              }}, stair.title),

              // Subtitle (channels)
              stair.subtitle && React.createElement("div", { style: {
                fontSize: isMobile ? 10 : 11, color: `${stair.color}99`, marginTop: 4,
                fontFamily: "'JetBrains Mono', monospace", fontWeight: 600, lineHeight: 1.4,
              }}, stair.subtitle),

              // Desc
              !stair.subtitle && React.createElement("div", { style: {
                fontSize: isMobile ? 11 : 12, color: `${T.muted}cc`, marginTop: 4,
                fontFamily: "'JetBrains Mono', monospace", lineHeight: 1.4,
              }}, stair.desc),

              // Bottom accent line
              React.createElement("div", { style: {
                position: "absolute", bottom: 0, left: 0, right: 0, height: 3,
                background: active ? `linear-gradient(90deg, ${stair.color}, ${stair.color}33)` : `${stair.color}15`,
                transition: "background 0.3s ease",
              }}),

              // Rising particles on active
              active && [0,1,2].map(pi =>
                React.createElement("div", { key: pi, style: {
                  position: "absolute", bottom: 8, left: `${25 + pi * 25}%`,
                  width: 4, height: 4, borderRadius: 2, background: stair.color,
                  animation: `particleUp 2s ease-out infinite`,
                  animationDelay: `${pi * 0.6}s`,
                }})
              ),
            ),

            // Arrow connector to next step — sits in the diagonal gap
            show && i < STAIRS.length - 1 && React.createElement("div", { style: {
              position: "absolute",
              left: stairW + gapX / 2 - 8,
              top: -(gapY / 2) - 8,
              fontSize: isMobile ? 18 : 22,
              color: `${stair.color}66`,
              animation: "arrowBounce 1.5s ease-in-out infinite",
              animationDelay: `${i * 0.2}s`,
              transform: "rotate(-45deg)",
            }}, "\u2191"),
          );
        }),

        // Completion badge
        visibleSteps >= STAIRS.length && React.createElement("div", { style: {
          position: "absolute",
          left: stepX * (STAIRS.length - 1) + stairW + 20,
          top: totalH - stairH - stepY * (STAIRS.length - 1) - 50,
          animation: "slideUp 0.8s ease-out",
        }},
          React.createElement("div", { style: {
            display: "flex", alignItems: "center", gap: 10,
            padding: "12px 20px", borderRadius: 12,
            background: `${T.electric}12`, border: `1px solid ${T.electric}33`,
          }},
            React.createElement("div", { style: { fontSize: 22, color: T.electric } }, "\u2714"),
            React.createElement("div", null,
              React.createElement("div", { style: { fontSize: 13, fontWeight: 800, color: T.electric, fontFamily: "'Outfit', sans-serif" } }, "Repeat Cycle"),
              React.createElement("div", { style: { fontSize: 10, color: T.muted, fontFamily: "'JetBrains Mono', monospace" } }, "Continuous optimization"),
            ),
          ),
        ),
      ),
    ),

    // Detail panel — appears when a step is clicked
    activeStep !== null && React.createElement("div", { style: {
      padding: isMobile ? "20px 16px" : "24px 40px",
      borderTop: `1px solid ${STAIRS[activeStep].color}33`,
      background: `linear-gradient(180deg, ${STAIRS[activeStep].color}08, ${T.bg})`,
      animation: "fadeIn 0.3s ease-out",
    }},
      React.createElement("div", { style: { maxWidth: 900, margin: "0 auto" } },
        React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 14, marginBottom: 14 } },
          React.createElement("div", { style: {
            width: 40, height: 40, borderRadius: 10,
            display: "flex", alignItems: "center", justifyContent: "center",
            background: `${STAIRS[activeStep].color}15`, border: `1.5px solid ${STAIRS[activeStep].color}44`,
            fontSize: 14, fontWeight: 900, color: STAIRS[activeStep].color,
            fontFamily: "'JetBrains Mono', monospace",
          }}, STAIRS[activeStep].num),
          React.createElement("div", null,
            React.createElement("div", { style: { fontSize: 18, fontWeight: 800, color: T.text, fontFamily: "'Outfit', sans-serif" } }, STAIRS[activeStep].title),
            React.createElement("div", { style: { fontSize: 12, color: STAIRS[activeStep].color, fontFamily: "'JetBrains Mono', monospace", fontWeight: 600, marginTop: 2 } }, STAIRS[activeStep].desc),
          ),
        ),
        React.createElement("p", { style: { fontSize: 15, color: T.textDim, lineHeight: 1.8, marginBottom: STAIRS[activeStep].channels ? 16 : 0 } }, STAIRS[activeStep].details),

        // Channel tags
        STAIRS[activeStep].channels && React.createElement("div", { style: { display: "flex", gap: 8, flexWrap: "wrap" } },
          STAIRS[activeStep].channels.map((ch, ci) =>
            React.createElement("div", { key: ci, style: {
              padding: "8px 16px", borderRadius: 8,
              background: `${STAIRS[activeStep].color}10`,
              border: `1px solid ${STAIRS[activeStep].color}30`,
              fontSize: 13, fontWeight: 700, color: STAIRS[activeStep].color,
              fontFamily: "'JetBrains Mono', monospace",
            }}, ch)
          ),
        ),
      ),
    ),

    // Footer
    React.createElement("footer", { style: {
      padding: isMobile ? "14px 16px" : "14px 40px",
      borderTop: `1px solid ${T.electric}44`,
      background: `linear-gradient(180deg, ${T.emerald}, ${T.bg})`,
      display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12,
    }},
      React.createElement("span", { style: { fontSize: 13, fontWeight: 800, letterSpacing: 1.5, color: T.electric, fontFamily: "'JetBrains Mono', monospace" } }, "\u0160KODA X \u2014 AI Brand Intelligence"),
      React.createElement("span", { style: { fontSize: 12, fontWeight: 600, color: `${T.electric}88`, fontFamily: "'JetBrains Mono', monospace" } }, "GEO Process \u00b7 7 Steps \u00b7 Continuous Cycle"),
    ),
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
