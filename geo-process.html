<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#060D0A">
<title>GEO Process — Škoda X</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body { background: #060D0A; overflow-x: hidden; -webkit-font-smoothing: antialiased; font-family: 'Outfit', sans-serif; color: #E8F5EE; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #14352A; border-radius: 4px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulseGlow { 0%,100% { box-shadow: 0 0 20px #78FAAE10; } 50% { box-shadow: 0 0 50px #78FAAE20; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes breathe { 0%,100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.15); opacity: 1; } }
  @keyframes dataFlow { 0% { transform: translateX(-100%); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateX(200%); opacity: 0; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const T = {
  emerald: "#0E3A2F", electric: "#78FAAE", emeraldLight: "#14493B",
  bg: "#060D0A", cardBg: "#0B1E17", cardBorder: "#14352A",
  muted: "#4A7A6A", text: "#E8F5EE", textDim: "#9EC5B3",
  amber: "#F5C842", red: "#E85454", cyan: "#5AD4C4",
  purple: "#B4A0FF", blue: "#5AA8D4",
};

const STEPS = [
  {
    num: "01", title: "GEO Analytics", color: T.electric,
    desc: "Monitoring & data collection from AI platforms",
    details: "Systematic querying of ChatGPT, Claude, Gemini & Perplexity. Brand mention detection, position tracking, competitor analysis across all AI engines.",
    group: "analyze",
  },
  {
    num: "02", title: "Executive Summary + Overview", color: T.cyan,
    desc: "High-level visibility scorecard",
    details: "Consolidated KPI dashboard with visibility score, sentiment trends, competitive positioning and key findings for leadership review.",
    group: "analyze",
  },
  {
    num: "03", title: "Insights & Recommendations", color: T.blue,
    desc: "Data-driven optimization strategy",
    details: "Actionable recommendations based on gap analysis. Priority list of content improvements, keyword opportunities and competitive threats.",
    group: "optimize",
  },
  {
    num: "04", title: "Content Sources", color: T.purple,
    subtitle: "Website Metadata \u00b7 Website Content \u00b7 Media Content \u00b7 Blogs Content",
    desc: "Owned content optimization",
    details: "Optimize website metadata, page content, media assets and blog articles for AI discoverability. Schema.org markup, structured data, factual accuracy.",
    channels: ["Website Metadata", "Website Content", "Media Content", "Blogs Content"],
    group: "optimize",
  },
  {
    num: "05", title: "External Channels", color: T.amber,
    subtitle: "Facebook \u00b7 YouTube \u00b7 Wikipedia \u00b7 Reddit",
    desc: "Third-party presence & citations",
    details: "Strengthen brand presence on platforms that AI engines use as training data and citation sources. Ensure consistent, accurate brand information.",
    channels: ["Facebook", "YouTube", "Wikipedia", "Reddit"],
    group: "optimize",
  },
  {
    num: "06", title: "Content Creation", color: T.electric,
    desc: "Produce optimized content",
    details: "Create new content specifically designed for AI visibility \u2014 authoritative articles, FAQ pages, structured comparisons, expert guides.",
    group: "create",
  },
  {
    num: "07", title: "Implementation", color: T.cyan,
    desc: "Deploy & measure impact",
    details: "Publish optimized content, update metadata, deploy changes across all channels. Monitor AI response changes and measure visibility improvement.",
    group: "deploy",
  },
];

function useReveal(threshold = 0.2) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function StepCard({ step, index, active, onClick, isMobile }) {
  const [ref, vis] = useReveal(0.15);
  return React.createElement("div", {
    ref,
    onClick,
    style: {
      display: "flex", gap: isMobile ? 14 : 20, cursor: "pointer",
      opacity: vis ? 1 : 0, transform: vis ? "translateY(0)" : "translateY(24px)",
      transition: `all 0.5s ease ${index * 0.08}s`,
    },
  },
    // Left: number badge + connector
    React.createElement("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", flexShrink: 0, width: isMobile ? 44 : 52 } },
      React.createElement("div", { style: {
        width: isMobile ? 44 : 52, height: isMobile ? 44 : 52, borderRadius: 14,
        display: "flex", alignItems: "center", justifyContent: "center",
        background: active ? `${step.color}18` : T.cardBg,
        border: `2px solid ${active ? step.color : step.color + "33"}`,
        fontSize: isMobile ? 14 : 16, fontWeight: 900, color: active ? step.color : `${step.color}99`,
        fontFamily: "'JetBrains Mono', monospace",
        transition: "all 0.3s ease",
        animation: active ? "pulseGlow 2.5s ease-in-out infinite" : "none",
        flexShrink: 0,
      }}, step.num),
      index < STEPS.length - 1 && React.createElement("div", { style: {
        flex: 1, width: 2, minHeight: 16,
        background: `${step.color}33`, margin: "6px 0",
      }}),
    ),

    // Right: content
    React.createElement("div", { style: {
      flex: 1, padding: isMobile ? "12px 14px" : "16px 22px",
      borderRadius: 14,
      background: active ? `linear-gradient(160deg, ${T.emeraldLight}, ${step.color}08)` : T.cardBg,
      border: `1.5px solid ${active ? step.color + "44" : T.cardBorder}`,
      transition: "all 0.3s ease",
      boxShadow: active ? `0 4px 30px ${step.color}10` : "none",
      position: "relative", overflow: "hidden",
      marginBottom: 4,
    }},
      // Watermark
      React.createElement("div", { style: {
        position: "absolute", top: -6, right: 8,
        fontSize: isMobile ? 50 : 64, fontWeight: 900, fontFamily: "'JetBrains Mono', monospace",
        color: `${step.color}05`, lineHeight: 1, pointerEvents: "none",
      }}, step.num),

      // Phase label
      React.createElement("div", { style: {
        fontSize: 10, fontWeight: 700, color: active ? step.color : `${step.color}77`,
        fontFamily: "'JetBrains Mono', monospace", letterSpacing: 2,
        marginBottom: 5, textTransform: "uppercase", transition: "color 0.3s ease",
      }}, `Step ${step.num}`),

      // Title
      React.createElement("div", { style: {
        fontSize: isMobile ? 17 : 20, fontWeight: 800, color: active ? T.text : `${T.text}cc`,
        fontFamily: "'Outfit', sans-serif", lineHeight: 1.25, transition: "color 0.3s ease",
      }}, step.title),

      // Subtitle
      step.subtitle && React.createElement("div", { style: {
        fontSize: 11, color: `${step.color}88`, marginTop: 4,
        fontFamily: "'JetBrains Mono', monospace", fontWeight: 600,
      }}, step.subtitle),

      // Desc
      React.createElement("div", { style: {
        fontSize: 13, color: `${T.muted}cc`, marginTop: 6, lineHeight: 1.5,
        fontFamily: "'JetBrains Mono', monospace",
      }}, step.desc),

      // Expanded details
      active && React.createElement("div", { style: { marginTop: 14, animation: "fadeIn 0.3s ease-out" } },
        React.createElement("p", { style: { fontSize: 14, color: T.textDim, lineHeight: 1.7, marginBottom: step.channels ? 12 : 0 } }, step.details),
        step.channels && React.createElement("div", { style: { display: "flex", gap: 6, flexWrap: "wrap" } },
          step.channels.map((ch, ci) => React.createElement("div", { key: ci, style: {
            padding: "6px 12px", borderRadius: 6,
            background: `${step.color}10`, border: `1px solid ${step.color}25`,
            fontSize: 11, fontWeight: 700, color: step.color,
            fontFamily: "'JetBrains Mono', monospace",
          }}, ch)),
        ),
      ),

      // Bottom accent
      React.createElement("div", { style: {
        position: "absolute", bottom: 0, left: 0, right: 0, height: 2,
        background: active ? `linear-gradient(90deg, ${step.color}, ${step.color}33)` : `${step.color}10`,
        transition: "background 0.3s ease",
      }}),
    ),
  );
}

function App() {
  const [activeStep, setActiveStep] = useState(null);
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  const analyzeSteps = STEPS.filter(s => s.group === "analyze");
  const optimizeSteps = STEPS.filter(s => s.group === "optimize");
  const createSteps = STEPS.filter(s => s.group === "create");
  const deploySteps = STEPS.filter(s => s.group === "deploy");

  return React.createElement("div", { style: { minHeight: "100vh", background: T.bg, display: "flex", flexDirection: "column" } },

    // Grid bg
    React.createElement("div", { style: {
      position: "fixed", inset: 0, opacity: 0.02, pointerEvents: "none",
      backgroundImage: `linear-gradient(${T.electric} 1px, transparent 1px), linear-gradient(90deg, ${T.electric} 1px, transparent 1px)`,
      backgroundSize: "80px 80px",
    }}),

    // Header
    React.createElement("header", { style: {
      padding: isMobile ? "16px 16px" : "20px 40px",
      display: "flex", justifyContent: "space-between", alignItems: "center",
      borderBottom: `1px solid ${T.cardBorder}`,
      background: `${T.bg}ee`, backdropFilter: "blur(12px)",
      position: "sticky", top: 0, zIndex: 50, flexWrap: "wrap", gap: 12,
    }},
      React.createElement("a", { href: "index.html", style: { textDecoration: "none", display: "flex", flexDirection: "column" } },
        React.createElement("div", { style: { fontSize: isMobile ? 22 : 32, fontWeight: 900, color: T.text, letterSpacing: 1, fontFamily: "'Outfit', sans-serif" } }, "\u0160koda X"),
        React.createElement("div", { style: { fontSize: isMobile ? 11 : 13, fontWeight: 700, color: T.electric, letterSpacing: 3, fontFamily: "'JetBrains Mono', monospace", textTransform: "uppercase", marginTop: 2 } }, "Next Steps"),
      ),
      React.createElement("div", { style: { display: "flex", gap: 8, flexWrap: "wrap" } },
        [
          { href: "index.html", label: "\u25c6 Intro", active: false },
          { href: "flow.html", label: "\u25c9 Flow", active: false },
          { href: "setup.html", label: "\u2699 Setup", active: false },
          { href: "dashboard.html", label: "\u25a0 Dashboard", active: false },
          { href: "geo-process.html", label: "\u25b8 Next Steps", active: true },
        ].map((l, i) => React.createElement("a", { key: i, href: l.href, style: {
          padding: "7px 14px", borderRadius: 8, textDecoration: "none",
          background: l.active ? `${T.electric}18` : `${T.cardBg}aa`,
          border: `1px solid ${l.active ? T.electric + "55" : T.cardBorder}`,
          color: l.active ? T.electric : T.muted, fontSize: 11, fontWeight: 700,
          fontFamily: "'JetBrains Mono', monospace", transition: "all 0.2s ease",
        }}, l.label)),
      ),
    ),

    // Main content
    React.createElement("main", { style: {
      flex: 1, maxWidth: 720, margin: "0 auto", width: "100%",
      padding: isMobile ? "24px 16px 60px" : "36px 24px 80px",
    }},

      // Phase 1: Analyze (steps 1-2)
      React.createElement("div", { style: { marginBottom: 8 } },
        React.createElement("div", { style: {
          fontSize: 11, fontWeight: 700, color: `${T.electric}55`, letterSpacing: 3,
          fontFamily: "'JetBrains Mono', monospace", textTransform: "uppercase",
          marginBottom: 16, paddingLeft: isMobile ? 58 : 72,
        }}, "Analyze"),
        analyzeSteps.map((step, si) => {
          const i = STEPS.indexOf(step);
          return React.createElement(StepCard, {
            key: step.num, step, index: i, isMobile,
            active: activeStep === i,
            onClick: () => setActiveStep(activeStep === i ? null : i),
          });
        }),
      ),

      // Phase 2: Optimize (steps 3-5) — grouped visually
      React.createElement("div", { style: { marginBottom: 8 } },
        React.createElement("div", { style: {
          fontSize: 11, fontWeight: 700, color: `${T.amber}55`, letterSpacing: 3,
          fontFamily: "'JetBrains Mono', monospace", textTransform: "uppercase",
          marginBottom: 16, paddingLeft: isMobile ? 58 : 72,
        }}, "Optimize"),
        React.createElement("div", { style: {
          borderLeft: `2px solid ${T.amber}22`,
          borderRight: `2px solid ${T.amber}22`,
          borderTop: `1px solid ${T.amber}15`,
          borderBottom: `1px solid ${T.amber}15`,
          borderRadius: 20,
          padding: isMobile ? "16px 10px" : "20px 16px",
          background: `linear-gradient(180deg, ${T.amber}04, transparent 30%, transparent 70%, ${T.amber}04)`,
          position: "relative",
        }},
          // Group label badge
          React.createElement("div", { style: {
            position: "absolute", top: -10, left: isMobile ? 54 : 68,
            padding: "3px 12px", borderRadius: 6,
            background: T.bg, border: `1px solid ${T.amber}33`,
            fontSize: 9, fontWeight: 800, color: T.amber, letterSpacing: 2,
            fontFamily: "'JetBrains Mono', monospace", textTransform: "uppercase",
          }}, "Steps 03\u201305 \u00b7 Content & Channels"),
          optimizeSteps.map((step, si) => {
            const i = STEPS.indexOf(step);
            return React.createElement(StepCard, {
              key: step.num, step, index: i, isMobile,
              active: activeStep === i,
              onClick: () => setActiveStep(activeStep === i ? null : i),
            });
          }),
        ),
      ),

      // Phase 3: Create (step 6)
      React.createElement("div", { style: { marginBottom: 8 } },
        React.createElement("div", { style: {
          fontSize: 11, fontWeight: 700, color: `${T.electric}55`, letterSpacing: 3,
          fontFamily: "'JetBrains Mono', monospace", textTransform: "uppercase",
          marginBottom: 16, paddingLeft: isMobile ? 58 : 72,
        }}, "Create"),
        createSteps.map((step, si) => {
          const i = STEPS.indexOf(step);
          return React.createElement(StepCard, {
            key: step.num, step, index: i, isMobile,
            active: activeStep === i,
            onClick: () => setActiveStep(activeStep === i ? null : i),
          });
        }),
      ),

      // Phase 4: Deploy (step 7)
      React.createElement("div", { style: { marginBottom: 8 } },
        React.createElement("div", { style: {
          fontSize: 11, fontWeight: 700, color: `${T.cyan}55`, letterSpacing: 3,
          fontFamily: "'JetBrains Mono', monospace", textTransform: "uppercase",
          marginBottom: 16, paddingLeft: isMobile ? 58 : 72,
        }}, "Deploy"),
        deploySteps.map((step, si) => {
          const i = STEPS.indexOf(step);
          return React.createElement(StepCard, {
            key: step.num, step, index: i, isMobile,
            active: activeStep === i,
            onClick: () => setActiveStep(activeStep === i ? null : i),
          });
        }),
      ),

      // Loop indicator
      React.createElement("div", { style: {
        marginTop: 24, display: "flex", alignItems: "center", justifyContent: "center", gap: 14,
        padding: "16px 24px", borderRadius: 14,
        background: T.cardBg, border: `1px solid ${T.cardBorder}`,
      }},
        React.createElement("div", { style: { fontSize: 22, color: T.cyan, animation: "spin 4s linear infinite" } }, "\u21bb"),
        React.createElement("div", null,
          React.createElement("div", { style: { fontSize: 14, fontWeight: 700, color: T.text } }, "Continuous Optimization Cycle"),
          React.createElement("div", { style: { fontSize: 11, color: T.muted, fontFamily: "'JetBrains Mono', monospace", marginTop: 2 } }, "Process repeats with refined parameters"),
        ),
      ),
    ),

    // Footer
    React.createElement("footer", { style: {
      padding: isMobile ? "24px 20px" : "20px 48px",
      borderTop: `1px solid ${T.electric}33`,
      background: `linear-gradient(180deg, ${T.emerald}, ${T.bg})`,
      display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 16,
    }},
      React.createElement("div", null,
        React.createElement("div", { style: { fontSize: 14, fontWeight: 800, color: T.electric, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1.5 } }, "\u0160KODA X \u2014 AI Brand Intelligence"),
        React.createElement("div", { style: { fontSize: 11, color: T.muted, marginTop: 4 } }, "Generative Engine Optimization \u00b7 Monitoring \u00b7 Optimization"),
      ),
      React.createElement("div", { style: { display: "flex", gap: 10, flexWrap: "wrap" } },
        [
          { href: "index.html", label: "Intro", color: T.electric },
          { href: "flow.html", label: "Flow", color: T.electric },
          { href: "setup.html", label: "Setup", color: T.electric },
          { href: "dashboard.html", label: "Dashboard", color: T.cyan },
          { href: "geo-process.html", label: "Next Steps", color: T.amber },
        ].map((l, i) => React.createElement("a", { key: i, href: l.href, style: {
          padding: "7px 14px", borderRadius: 6, textDecoration: "none",
          border: `1px solid ${l.color}44`, background: `${l.color}08`,
          color: l.color, fontSize: 11, fontWeight: 700,
          fontFamily: "'JetBrains Mono', monospace",
        }}, l.label)),
      ),
    ),
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
