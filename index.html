// ── PASSWORD GATE ──
const PWD_HASH = "80cc50a3868ad7b9d1c1139dc3299ded82cbfa81e927b41279cd35e59830b87d";
async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

  const [fading, setFading] = useState(false);
  const tryUnlock = async () => {
    const hash = await sha256(pwd.trim().toLowerCase());

// ── INTERSECTION OBSERVER HOOK ──
function useReveal(threshold = 0.25) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);

  // Track active section
  useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {

          if (idx >= 0) setActiveSection(idx);
        }

    }, { threshold: 0.5 });
    sectionRefs.forEach(r => r.current && obs.observe(r.current));
    return () => obs.disconnect();
  }, []);

    sectionRefs[i].current?.scrollIntoView({ behavior: "smooth" });
  };
