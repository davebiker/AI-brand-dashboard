// Helpers
const allQueries = QUERY_CATEGORIES.flatMap(c => c.queries.map(q => ({ query: q, category: c.category })));
const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

function generateScores() {
  const s = {};
  PLATFORMS.forEach(p => { s[p.name] = rand(28, 55); });
  return s;
}
function generateOverall(s) {
  const vals = Object.values(s);
  return Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);
}
function generateCompetitorData() {
  return COMPETITORS.map(name => ({
    name,
    score: name === "Škoda" ? rand(22, 38)
         : name === "Tesla" ? rand(55, 78)
         : name === "BMW" ? rand(48, 72)
         : name === "Hyundai" ? rand(45, 68)
         : name === "Toyota" ? rand(50, 70)
         : name === "BYD" ? rand(30, 52)
         : rand(28, 65),
  })).sort((a, b) => b.score - a.score);
}
// Sequential query index — cycles through ALL queries one by one
let queryIndex = 0;
function getNextQuery() {
  const item = allQueries[queryIndex % allQueries.length];
  queryIndex++;
  return item;
}

function generateFeedItem() {
  const item = getNextQuery();
  const platform = PLATFORMS[rand(0, PLATFORMS.length - 1)];
  const mentioned = Math.random() > 0.55;
  const position = mentioned ? rand(3, 7) : null;
  const sentiment = mentioned ? ["pozitivní", "neutrální", "neutrální", "negativní"][rand(0, 3)] : null;
  return { ...item, platform: platform.name, platformColor: platform.color, mentioned, position, sentiment, time: new Date(), index: queryIndex };
}

function ScoreRing({ value, size = 120, stroke = 8, color = THEME.electric, label }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (value / 100) * circ;
  return React.createElement("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", gap: 4 } },
    React.createElement("svg", { width: size, height: size, style: { transform: "rotate(-90deg)" } },
      React.createElement("circle", { cx: size/2, cy: size/2, r, fill: "none", stroke: THEME.cardBorder, strokeWidth: stroke }),
      React.createElement("circle", { cx: size/2, cy: size/2, r, fill: "none", stroke: color, strokeWidth: stroke,
        strokeDasharray: circ, strokeDashoffset: offset, strokeLinecap: "round",
        style: { transition: "stroke-dashoffset 1.5s ease" } }),
      React.createElement("text", { x: size/2, y: size/2, textAnchor: "middle", dominantBaseline: "central",
        fill: THEME.text, fontSize: size * 0.28, fontWeight: "700",
        style: { transform: "rotate(90deg)", transformOrigin: "center" },
        fontFamily: "'JetBrains Mono', monospace" }, value),
    ),
    label && React.createElement("span", { style: { fontSize: 13, color: THEME.muted, fontWeight: 600, letterSpacing: 0.5 } }, label),
  );
}

function BarChart({ data, compact }) {
  const sorted = [...data].sort((a, b) => b.score - a.score);
  return React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: compact ? 5 : 8 } },

      const isS = d.name === "Škoda";

          width: compact ? 54 : 68, fontSize: compact ? 12 : 14,
          color: isS ? THEME.electric : THEME.textDim,
          fontWeight: isS ? 700 : 400, textAlign: "right", flexShrink: 0,
          fontFamily: "'JetBrains Mono', monospace",
        }}, d.name),
        React.createElement("div", { style: {
          flex: 1, height: compact ? 18 : 24, background: THEME.cardBorder,
          borderRadius: 3, overflow: "hidden", position: "relative",
        }},

            background: isS

            fontFamily: "'JetBrains Mono', monospace", fontWeight: 600,
          }}, `${d.score}%`),
        ),
      );
    })
  );
}

// ── MAIN APP ──
function App() {
  const [mode, setMode] = useState("tv");
  const [scores, setScores] = useState(generateScores());
  const [competitors, setCompetitors] = useState(generateCompetitorData());
  const [feed, setFeed] = useState(() => Array.from({ length: 10 }, () => generateFeedItem()));
  const [tick, setTick] = useState(0);
  const [processed, setProcessed] = useState(10); // started with 10

  const overall = generateOverall(scores);
  const mentionRate = rand(35, 52);
  const avgPosition = (rand(32, 45) / 10).toFixed(1);
  const trendVal = rand(-8, -1);
  const cycleNum = Math.floor((processed - 1) / allQueries.length) + 1;
  const posInCycle = ((processed - 1) % allQueries.length) + 1;

  useEffect(() => {
    const interval = setInterval(() => {
      setTick(t => t + 1);
      setProcessed(p => p + 1);
      setFeed(prev => [generateFeedItem(), ...prev.slice(0, 9)]);
      if (Math.random() > 0.5) {
        setScores(generateScores());
        setCompetitors(generateCompetitorData());
      }
    }, UPDATE_INTERVAL);
    return () => clearInterval(interval);
  }, []);

  // Detect mobile
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  // Fullscreen: show layout directly
  const isFullscreen = window.location.hash === "#tv" || window.location.hash === "#vertical";
  if (isFullscreen) {
    const m = window.location.hash.replace("#", "");
    if (m === "tv") return React.createElement(TVLayout, { scores, overall, competitors, feed, mentionRate, avgPosition, trendVal, posInCycle, cycleNum });
    return React.createElement(VerticalLayout, { scores, overall, competitors, feed, mentionRate, avgPosition, mobile: true, posInCycle, cycleNum });
  }

  // Mobile: go straight to vertical mobile layout, no frame
  if (isMobile) {
    return React.createElement(VerticalLayout, { scores, overall, competitors, feed, mentionRate, avgPosition, mobile: true, posInCycle, cycleNum });
  }

  // Preview mode with switcher
  return React.createElement("div", { style: {
    minHeight: "100vh", background: "#030806", display: "flex", flexDirection: "column",
    alignItems: "center", padding: "20px 10px", fontFamily: "'Outfit', sans-serif",
  }},
    // Switcher
    React.createElement("div", { style: {
      display: "flex", gap: 4, marginBottom: 12, padding: 4, borderRadius: 10,
      background: THEME.cardBg, border: `1px solid ${THEME.cardBorder}`,
    }},
      [
        { key: "tv", label: "📺 LED TV (16:9)" },
        { key: "vertical", label: "📱 Vertikální panel" },
      ].map(m => React.createElement("button", {
        key: m.key, onClick: () => setMode(m.key),
        style: {
          padding: "8px 20px", borderRadius: 8, border: "none", cursor: "pointer",
          fontSize: 13, fontWeight: 600, fontFamily: "'Outfit', sans-serif",
          background: mode === m.key ? `linear-gradient(135deg, ${THEME.emerald}, ${THEME.emeraldLight})` : "transparent",
          color: mode === m.key ? THEME.electric : THEME.muted,
          transition: "all 0.3s ease",
        },
      }, m.label)),
    ),

    // Fullscreen hint
    React.createElement("div", { style: {
      marginBottom: 16, fontSize: 11, color: THEME.muted, textAlign: "center",
      fontFamily: "'JetBrains Mono', monospace",
    }},
      "Pro fullscreen na TV/panelu otevři: ",
      React.createElement("span", { style: { color: THEME.electric } },
        mode === "tv" ? "index.html#tv" : "index.html#vertical"),
    ),

    // Stats summary
    React.createElement("div", { style: {
      marginBottom: 16, padding: "12px 24px", borderRadius: 10,
      background: THEME.cardBg, border: `1px solid ${THEME.cardBorder}`,
    }},
      React.createElement(StatsBar, { mentionRate, avgPosition, queriesCount: allQueries.length, posInCycle, cycleNum }),
    ),

    // Dashboard frame
    React.createElement("div", { style: {
      background: "#000", borderRadius: mode === "tv" ? 12 : 16,
      padding: mode === "tv" ? "6px 6px 24px 6px" : "10px 6px",
      boxShadow: `0 0 80px ${THEME.emerald}15, 0 0 160px ${THEME.electric}08, 0 20px 60px rgba(0,0,0,0.6)`,
      position: "relative",
    }},
      React.createElement("div", { style: {
        borderRadius: mode === "tv" ? 6 : 10,
        overflow: "hidden",
        zoom: mode === "tv" ? 0.85 : 1,
      }},
        mode === "tv"
          ? React.createElement(TVLayout, { scores, overall, competitors, feed, mentionRate, avgPosition, trendVal, posInCycle, cycleNum })
          : React.createElement(VerticalLayout, { scores, overall, competitors, feed, mentionRate, avgPosition, posInCycle, cycleNum }),
      ),
      mode === "tv" && React.createElement("div", { style: {
        position: "absolute", bottom: 6, left: "50%", transform: "translateX(-50%)",
        fontSize: 8, color: "#222", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 3, textTransform: "uppercase",
      }}, "samsung"),
    ),

    // Info
    React.createElement("div", { style: {
      marginTop: 16, fontSize: 11, color: THEME.muted, textAlign: "center",
      fontFamily: "'JetBrains Mono', monospace", lineHeight: 1.6,
    }},
      React.createElement("span", { style: { color: THEME.electric, opacity: 0.5 } }, "●"),
      ` ${allQueries.length} dotazů · ${PLATFORMS.length} platformy · ${COMPETITORS.length} konkurentů`,
      React.createElement("br"),
      React.createElement("span", { style: { fontSize: 10, color: `${THEME.muted}88` } },
        `Škoda CI — Emerald (#0E3A2F) + Electric Green (#78FAAE) · refresh ${UPDATE_INTERVAL/1000}s`),
    ),
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
