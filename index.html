const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

function generateScores() {
  const s = {};
  PLATFORMS.forEach(p => { s[p.name] = rand(35, 65); });
  return s;
}
function generateOverall(competitors, name = "Škoda") {
  const entry = competitors.find(c => c.name === name);
  const total = competitors.reduce((sum, c) => sum + c.score, 0);
  return entry && total > 0 ? Math.round((entry.score / total) * 100) : 0;
}
function generateCompetitorData() {
  return COMPETITORS.map(name => ({
    name,
    score: name === "Škoda" ? rand(8, 32)
         : name === "Tesla" ? rand(58, 70)
         : name === "BMW" ? rand(45, 58)
         : name === "Hyundai" ? rand(35, 50)
         : name === "Toyota" ? rand(42, 55)
         : name === "VW" ? rand(38, 52)
         : name === "Kia" ? rand(25, 38)
         : name === "BYD" ? rand(8, 22)
         : name === "Xpeng" ? rand(1, 12)
         : rand(15, 40),
  })).sort((a, b) => b.score - a.score);
}

function generateModelCompetitorData(modelKey) {
  const cfg = MODEL_CONFIG[modelKey];
  if (!cfg) return [];
  const all = [
    { name: cfg.label, score: rand(cfg.scoreRange[0], cfg.scoreRange[1]) },
    ...cfg.competitors.map(name => ({
      name, score: rand((cfg.competitorRanges[name] || [15, 40])[0], (cfg.competitorRanges[name] || [15, 40])[1]),
    })),
  ];
  return all.sort((a, b) => b.score - a.score);
}

function generateSentimentData() {
  return COMPETITORS.map(name => {
    let pos, neu, neg;
    if (name === "Škoda") {
      pos = rand(35, 50); neg = rand(15, 25); neu = 100 - pos - neg;
    } else if (name === "Tesla") {
      pos = rand(50, 68); neg = rand(8, 18); neu = 100 - pos - neg;
    } else if (name === "BMW") {
      pos = rand(45, 62); neg = rand(10, 20); neu = 100 - pos - neg;
    } else if (name === "Toyota") {
      pos = rand(52, 70); neg = rand(5, 15); neu = 100 - pos - neg;
    } else if (name === "Hyundai") {
      pos = rand(42, 58); neg = rand(12, 22); neu = 100 - pos - neg;
    } else {
      pos = rand(30, 55); neg = rand(10, 28); neu = 100 - pos - neg;
    }
    return { name, pos, neu, neg };
  }).sort((a, b) => b.pos - a.pos);
}

function generateModelSentimentData(modelKey) {
  const cfg = MODEL_CONFIG[modelKey];
  if (!cfg) return [];
  const all = [cfg.label, ...cfg.competitors];
  return all.map(name => {
    const isSkoda = name === cfg.label;
    const pos = isSkoda ? rand(30, 48) : rand(28, 65);
    const neg = isSkoda ? rand(18, 30) : rand(8, 28);
    const neu = 100 - pos - neg;
    return { name, pos, neu, neg };
  }).sort((a, b) => b.pos - a.pos);
}

}

function generateTrendData() {
  // Generate 7 days of SoV data with slight random walk
  const days = [];
  let val = rand(5, 15);
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push({ day: d, value: Math.max(1, Math.min(25, val)) });
    val += rand(-3, 4);
  }
  return days;
}
// Sequential query index — cycles through ALL queries one by one
let queryIndex = 0;
function getNextQuery() {
  const item = allQueries[queryIndex % allQueries.length];
  queryIndex++;
  return item;
}

function generateFeedItem() {
  const item = getNextQuery();
  const platform = PLATFORMS[rand(0, PLATFORMS.length - 1)];
  const mentioned = Math.random() > 0.4;
  const position = mentioned ? rand(2, 6) : null;
  const sentiment = mentioned ? ["pozitivní", "pozitivní", "neutrální", "neutrální", "negativní"][rand(0, 4)] : null;
  return { ...item, platform: platform.name, platformColor: platform.color, mentioned, position, sentiment, time: new Date(), index: queryIndex };
}

function TrendChart({ data, width = 260, height = 120, t, lang, compact }) {
  const w = width;
  const h = height;
  const padL = 28, padR = 8, padT = 20, padB = 20;
  const chartW = w - padL - padR;
  const chartH = h - padT - padB;
  const vals = data.map(d => d.value);
  const minV = Math.max(0, Math.min(...vals) - 3);
  const maxV = Math.max(...vals) + 3;
  const range = maxV - minV || 1;
  const current = vals[vals.length - 1];
  const prev = vals[vals.length - 2];
  const diff = current - prev;

  const pts = data.map((d, i) => {
    const x = padL + (i / (data.length - 1)) * chartW;
    const y = padT + chartH - ((d.value - minV) / range) * chartH;
    return { x, y, val: d.value, day: d.day };
  });
  const linePath = pts.map((p, i) => `${i === 0 ? "M" : "L"}${p.x},${p.y}`).join(" ");
  const areaPath = linePath + ` L${pts[pts.length-1].x},${padT + chartH} L${pts[0].x},${padT + chartH} Z`;
  const last = pts[pts.length - 1];
  const dayNames = lang === "en"
    ? ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]
    : ["Ne","Po","Út","St","Čt","Pá","So"];

  return React.createElement("div", { style: { textAlign: "center" } },
    // Current value big
    React.createElement("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "center", gap: 8, marginBottom: 4 } },
      React.createElement("span", { style: {
        fontSize: compact ? 36 : 44, fontWeight: 700, color: THEME.electric,
        fontFamily: "'JetBrains Mono', monospace", lineHeight: 1,
      }}, `${current}%`),
      React.createElement("span", { style: {
        fontSize: compact ? 13 : 15, fontWeight: 600,
        color: diff >= 0 ? THEME.electric : THEME.red,
        fontFamily: "'JetBrains Mono', monospace",
      }}, `${diff >= 0 ? "▲" : "▼"} ${Math.abs(diff)}%`),
    ),
    React.createElement("div", { style: {
      fontSize: compact ? 10 : 11, color: THEME.muted, marginBottom: 6,
      fontFamily: "'JetBrains Mono', monospace",
    }}, t.shareOfVoiceSub),
    // SVG chart
    React.createElement("svg", { width: w, height: h, style: { display: "block", margin: "0 auto" } },
      // Horizontal grid
      [0, 0.5, 1].map((f, i) => {
        const y = padT + chartH * (1 - f);
        const val = Math.round(minV + range * f);
        return React.createElement("g", { key: i },
          React.createElement("line", { x1: padL, x2: w - padR, y1: y, y2: y,
            stroke: THEME.cardBorder, strokeWidth: 0.5 }),
          React.createElement("text", { x: padL - 4, y: y + 3, textAnchor: "end",
            fill: THEME.muted, fontSize: 8, fontFamily: "'JetBrains Mono', monospace" }, `${val}%`),
        );
      }),
      // Area fill
      React.createElement("path", { d: areaPath, fill: `${THEME.electric}12` }),
      // Line
      React.createElement("path", { d: linePath, fill: "none", stroke: THEME.electric, strokeWidth: 2,
        strokeLinejoin: "round", strokeLinecap: "round" }),
      // Data points
      pts.map((p, i) => React.createElement("circle", {
        key: i, cx: p.x, cy: p.y, r: i === pts.length - 1 ? 4 : 2.5,
        fill: i === pts.length - 1 ? THEME.electric : `${THEME.electric}88`,
        stroke: i === pts.length - 1 ? THEME.bg : "none", strokeWidth: 2,
      })),
      // Day labels
      pts.map((p, i) => React.createElement("text", {
        key: i, x: p.x, y: h - 4, textAnchor: "middle",
        fill: THEME.muted, fontSize: 8, fontFamily: "'JetBrains Mono', monospace",
      }, dayNames[p.day.getDay()])),
      // Last point glow
      React.createElement("circle", { cx: last.x, cy: last.y, r: 8,
        fill: "none", stroke: THEME.electric, strokeWidth: 1, opacity: 0.3,

}

// ── MAIN APP ──
function App() {
  const [mode, setMode] = useState("tv");
  const [lang, setLang] = useState("cs");
  const t = LANG[lang];
  const [viewMode, setViewModeState] = useState("brand"); // "brand" | "model"
  const [selectedModel, setSelectedModelState] = useState("enyaq");

  const [market, setMarketState] = useState("cz");
  const setMarket = (m) => {
    setMarketState(m);
    regenAllData();
  };
  const setViewMode = (vm) => {
    setViewModeState(vm);
    setTimeout(regenAllData, 0);
  };
  const setSelectedModel = (sm) => {
    setSelectedModelState(sm);
    modelQueryIndex = 0;
    setTimeout(regenAllData, 0);
  };

  const [scores, setScores] = useState(generateScores());
  const [competitors, setCompetitors] = useState(generateCompetitorData());
  const [sentiment, setSentiment] = useState(generateSentimentData());
  const [sovTrend, setSovTrend] = useState(generateTrendData());
  const [feed, setFeed] = useState(() => Array.from({ length: 10 }, () => generateFeedItem()));
  const [tick, setTick] = useState(0);
  const [processed, setProcessed] = useState(10);

  function regenAllData() {
    setScores(generateScores());
    setCompetitors(generateCompetitorData());
    setSentiment(generateSentimentData());
    setSovTrend(generateTrendData());
    setFeed(Array.from({ length: 10 }, () => generateFeedItem()));
  }

  // Compute display data based on viewMode
  const isModelMode = viewMode === "model";
  const highlightName = isModelMode && MODEL_CONFIG[selectedModel] ? MODEL_CONFIG[selectedModel].label : "Škoda";
  const modelCfg = MODEL_CONFIG[selectedModel];
  const displayCompetitors = isModelMode ? generateModelCompetitorData(selectedModel) : competitors;
  const displaySentiment = isModelMode ? generateModelSentimentData(selectedModel) : sentiment;
  const displayCategories = isModelMode ? (modelCfg ? modelCfg.categories : []) : POSITION_CATEGORIES;
  const displayOverall = generateOverall(displayCompetitors, displayLabel);
  const displayLabel = isModelMode ? (modelCfg ? modelCfg.label : "Škoda") : "Škoda";

  const mentionRate = rand(52, 65);
  const avgPosition = (rand(25, 35) / 10).toFixed(1);
  const trendVal = rand(-4, 4);
  const totalQueries = isModelMode ? (modelCfg ? modelCfg.queries.length : 20) : allQueries.length;
  const cycleNum = Math.floor((processed - 1) / totalQueries) + 1;
  const posInCycle = ((processed - 1) % totalQueries) + 1;

  const tickRef = useRef(0);

  useEffect(() => {
    const interval = setInterval(() => {
      tickRef.current += 1;
      setTick(tickRef.current);
      setProcessed(p => p + 1);
      setFeed(prev => {
        const newItem = viewMode === "model" ? generateModelFeedItem(selectedModel) : generateFeedItem();
        return [newItem, ...prev.slice(0, 9)];
      });
      if (tickRef.current % 3 === 0) {
        setScores(generateScores());
        if (viewMode === "brand") {
          setCompetitors(generateCompetitorData());
          setSentiment(generateSentimentData());
        }
      }
    }, UPDATE_INTERVAL);
    return () => clearInterval(interval);
  }, [viewMode, selectedModel]);

  // Detect mobile
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  // Fullscreen: show layout directly
  const isFullscreen = window.location.hash === "#tv" || window.location.hash === "#vertical";
  if (isFullscreen) {
    const m = window.location.hash.replace("#", "");
    if (m === "tv") return React.createElement(TVLayout, { scores, displayCompetitors, displaySentiment, displayCategories, feed, mentionRate, avgPosition, sovTrend, posInCycle, cycleNum, totalQueries, market, setMarket, viewMode, setViewMode, selectedModel, setSelectedModel, t, lang, setLang });
    return React.createElement(VerticalLayout, { scores, displayCompetitors, displaySentiment, displayCategories, feed, mentionRate, avgPosition, sovTrend, posInCycle, cycleNum, totalQueries, market, setMarket, viewMode, setViewMode, selectedModel, setSelectedModel, t, lang, setLang, mobile: true });
  }

  // Mobile: go straight to vertical mobile layout, no frame
  if (isMobile) {
    return React.createElement(VerticalLayout, { scores, displayCompetitors, displaySentiment, displayCategories, feed, mentionRate, avgPosition, sovTrend, posInCycle, cycleNum, totalQueries, market, setMarket, viewMode, setViewMode, selectedModel, setSelectedModel, t, lang, setLang, mobile: true });
  }

  // Preview mode
  return React.createElement("div", { style: {
    minHeight: "100vh", background: "#030806", display: "flex", flexDirection: "column",
    alignItems: "center", padding: "20px 10px", fontFamily: "'Outfit', sans-serif",
  }},

    // Dashboard frame
    React.createElement("div", { style: {
      background: "#000", borderRadius: mode === "tv" ? 12 : 16,
      padding: mode === "tv" ? "6px 6px 24px 6px" : "10px 6px",
      boxShadow: `0 0 80px ${THEME.emerald}15, 0 0 160px ${THEME.electric}08, 0 20px 60px rgba(0,0,0,0.6)`,
      position: "relative",
    }},
      React.createElement("div", { style: {
        borderRadius: mode === "tv" ? 6 : 10,
        overflow: "hidden",
        zoom: mode === "tv" ? 0.85 : 1,
      }},
        mode === "tv"
          ? React.createElement(TVLayout, { scores, displayCompetitors, displaySentiment, displayCategories, feed, mentionRate, avgPosition, sovTrend, posInCycle, cycleNum, totalQueries, market, setMarket, viewMode, setViewMode, selectedModel, setSelectedModel, t, lang, setLang, mode, setMode })
          : React.createElement(VerticalLayout, { scores, displayCompetitors, displaySentiment, displayCategories, feed, mentionRate, avgPosition, sovTrend, posInCycle, cycleNum, totalQueries, market, setMarket, viewMode, setViewMode, selectedModel, setSelectedModel, t, lang, setLang, mode, setMode }),
      ),
      mode === "tv" && React.createElement("div", { style: {
        position: "absolute", bottom: 6, left: "50%", transform: "translateX(-50%)",
        fontSize: 8, color: "#222", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 3, textTransform: "uppercase",
      }}, "samsung"),
    ),

    // Info
    React.createElement("div", { style: {
      marginTop: 16, fontSize: 11, color: THEME.muted, textAlign: "center",
      fontFamily: "'JetBrains Mono', monospace", lineHeight: 1.6,
    }},
      React.createElement("span", { style: { color: THEME.electric, opacity: 0.5 } }, "●"),
      lang === "en" ? ` ${totalQueries} queries · ${PLATFORMS.length} platforms · ${COMPETITORS.length} competitors` : ` ${totalQueries} dotazů · ${PLATFORMS.length} platformy · ${COMPETITORS.length} konkurentů`,
      React.createElement("br"),
      React.createElement("span", { style: { fontSize: 10, color: `${THEME.muted}88` } },
        `Škoda CI — Emerald (#0E3A2F) + Electric Green (#78FAAE) · refresh ${UPDATE_INTERVAL/1000}s`),
    ),
  );
}
